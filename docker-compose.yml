services:
  # Single container runs both FastAPI (port 8000) and the LiveKit agent worker.
  # Env vars are injected by Coolify — no .env file needed on VPS.
  aiona:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
