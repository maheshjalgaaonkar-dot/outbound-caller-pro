services:
  # FastAPI Dashboard + REST API
  # Env vars are injected by Coolify — no .env file needed on VPS.
  api:
    build: .
    restart: unless-stopped
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # LiveKit Agent Worker — only makes outbound connections to LiveKit Cloud, no inbound ports needed.
  agent:
    build: .
    restart: unless-stopped
    command: python agent.py start
